name: Scrape Loterías RD

# Horarios de sorteos en República Dominicana (RD = UTC-4 todo el año).
# Para cubrir cuando los resultados se publican, corremos cada 5 minutos
# durante las ventanas activas y caemos a cada hora fuera de ellas como
# red de seguridad.
#
#   Ventanas RD (hora local) → equivalente UTC
#     09:00 – 09:30  →  13:00 – 13:30     Anguila Mañana
#     11:30 – 13:00  →  15:30 – 17:00     La Suerte / King MD, Anguila MD, Pick 3/4 Día, Florida MD, La Primera MD
#     14:00 – 15:30  →  18:00 – 19:30     Florida Tarde, La Suerte Tarde, NY MD
#     16:00 – 16:30  →  20:00 – 20:30     Anguila Tarde
#     19:25 – 19:35  →  23:25 – 23:35     NY Tarde
#     20:00 – 23:30  →  00:00 – 03:30     Quinielas nocturnas, Leidsa, Real, Loteka, Nacional, Florida/NY Noche, Americanas
#
# Cron es UTC; los rangos se traducen abajo.

on:
  schedule:
    # Anguila Mañana
    - cron: "*/5 13 * * *"
    # Mediodía: Quinielas, Picks, Loto Pool MD, Florida/NY MD, La Suerte
    - cron: "*/5 15-17 * * *"
    # Tarde: Florida Tarde, La Suerte Tarde, Anguila Tarde
    - cron: "*/5 18-20 * * *"
    # NY Tarde + arranque de las nocturnas
    - cron: "*/5 23 * * *"
    # Noche RD (cubre desde Quiniela Leidsa hasta Americanas)
    - cron: "*/5 0-3 * * *"
    # Red de seguridad fuera de ventanas: una corrida cada hora
    # (en el minuto 0) por si llega un resultado retrasado.
    - cron: "0 4-12 * * *"
    - cron: "0 14,21,22 * * *"
  workflow_dispatch: {}

concurrency:
  group: scrape-loterias-rd
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # <-- necesario para poder rebase/pull

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper.main   # ejecutar como módulo

      - name: Commit & push
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$(git status --porcelain public/)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/
            git commit -m "chore: resultados $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            # integra cambios remotos y luego empuja
            git fetch origin "$BRANCH_NAME"
            git pull --rebase origin "$BRANCH_NAME"
            git push origin HEAD:"$BRANCH_NAME"
          else
            echo "Sin cambios."
          fi
